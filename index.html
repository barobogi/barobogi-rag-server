<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RAG 채팅</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; resize: vertical; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #answer { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; min-height: 50px; border: 1px solid #dee2e6; }
        .info { text-align: center; color: #6c757d; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <h2>💬 AI RAG 채팅</h2>
    <textarea id="question" placeholder="질문을 입력하세요...">Money Tree가 무엇인가요?</textarea>
    <button id="btn" onclick="askQuestion()">질문하기</button>
    <div id="answer">답변이 여기에 표시됩니다.</div>
    <p class="info">서버: http://127.0.0.1:8000 | 모델: Ollama qwen2.5</p>

    <script>
        async function askQuestion() {
            const question = document.getElementById('question').value.trim();
            const answerDiv = document.getElementById('answer');
            const btn = document.getElementById('btn');
            
            if (!question) {
                alert('질문을 입력하세요.');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '답변 생성 중...';
            answerDiv.textContent = '⏳ Ollama가 답변을 생성하고 있습니다...';
            
            try {
                const res = await fetch('http://127.0.0.1:8000/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await res.json();
                
                if (res.ok) {
                    answerDiv.textContent = data.answer;
                } else {
                    answerDiv.textContent = '❌ 에러: ' + (data.detail || '알 수 없는 에러');
                }
            } catch (e) {
                answerDiv.textContent = '❌ 연결 에러: ' + e.message + '\n\n서버가 실행 중인지 확인하세요.';
            } finally {
                btn.disabled = false;
                btn.textContent = '질문하기';
            }
        }
        
        // Enter 키로 질문하기
        document.getElementById('question').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        });
    </script>
</body>
</html>
